version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      # Local dev credentials (matches backend/.env)
      MYSQL_ROOT_PASSWORD: aimandaddy
      MYSQL_DATABASE: finance_analyzer
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
